[tool.uv.workspace]
members = [
    "apps/api",
    "apps/api/core",
    "apps/api/connectors/github",
    "apps/api/connectors/jira",
]

[tool.uv.sources]
etip-core = { workspace = true }

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.27",          # async test client for FastAPI
    "testcontainers[postgres,redis]>=4.8",
    "ruff>=0.8",
    "mypy>=1.13",
    "faker>=33.0",
    "pytest-timeout>=2.4.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["apps/api/tests"]
pythonpath = [
    "apps/api/src",
    "apps/api/core/src",
    "apps/api/connectors/github/src",
    "apps/api/connectors/jira/src",
]
