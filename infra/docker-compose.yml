services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: etip
      POSTGRES_PASSWORD: etip
      POSTGRES_DB: etip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etip"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.7
    platform: linux/amd64
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 6s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://etip:etip@postgres:5432/etip
      DATABASE_URL_SYNC: postgresql+psycopg2://etip:etip@postgres:5432/etip
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ../apps/api/src:/app/apps/api/src               # hot-reload in dev
      - ../apps/api/alembic:/app/apps/api/alembic       # migrations
      - ../apps/api/core/src:/app/apps/api/core/src     # core package source
      - ../apps/api/connectors/github/src:/app/apps/api/connectors/github/src  # github connector source
      - model_cache:/root/.cache                        # persist fastembed + flashrank model weights
    command: >
      uvicorn etip_api.main:app
      --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://etip:etip@postgres:5432/etip
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache                        # persist fastembed model weights
    command: >
      celery -A etip_api.worker.celery_app worker
      --loglevel=info --concurrency=4

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        # Next.js server proxies API calls to this internal Docker URL.
        # The browser never calls the backend directly — no CORS needed.
        INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  model_cache:
